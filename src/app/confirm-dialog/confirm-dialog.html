
<h2 mat-dialog-title>Confirmation</h2>

<mat-dialog-content>
  Voulez-vous vraiment supprimer cet assignment ?
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onNo()">Annuler</button>
  <button mat-button color="warn" (click)="onYes()">Supprimer</button>
</mat-dialog-actions>
