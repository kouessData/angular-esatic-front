<div class="dashboard">

  <!-- HEADER -->
  <div class="header">
    <h2>{{titre}}</h2>

    <div class="stats">
      <div class="card">📊 Total : {{totalDocs}}</div>
      <div class="card">📄 Page : {{page}} / {{totalPages}}</div>
    </div>
  </div>

  <!-- FILTRES -->
  <div class="filters">
    
    <input type="text" placeholder="🔍 Rechercher étudiant..."
    [(ngModel)]="search" (input)="onSearchChange()"
    />
    

    <select (change)="filtrerRendu($any($event.target).value)">
      <option value="">Tous</option>
      <option value="true">Rendu</option>
      <option value="false">Non rendu</option>
    </select>

    <select #matiere (change)="filtrerMatiere(matiere.value)">
        <option value="">Toutes matières</option>

        <option *ngFor="let m of matieres" [value]="m.nom">
            {{m.nom}}
        </option>
    </select>

    <button (click)="refresh()">🔄 Actualiser</button>

  

  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table mat-table 
           [dataSource]="assignmentsFiltres.length ? assignmentsFiltres : assignments()" 
           class="mat-elevation-z8">

      <!-- Étudiant -->
      <ng-container matColumnDef="assignment-nom">
        <th mat-header-cell *matHeaderCellDef> Étudiant </th>
        <td mat-cell *matCellDef="let element">
          {{element.nom}}
        </td>
      </ng-container>

      <!-- Devoir -->
      <ng-container matColumnDef="assignment-nomDevoir">
        <th mat-header-cell *matHeaderCellDef> Devoir </th>
        <td mat-cell *matCellDef="let element">
          {{element.nomDevoir}}
        </td>
      </ng-container>

      <!-- Matière -->
      <ng-container matColumnDef="assignment-matiere">
        <th mat-header-cell *matHeaderCellDef> Matière </th>
        <td mat-cell *matCellDef="let element">
          {{element.matiere}}
        </td>
      </ng-container>

      <!-- Prof -->
      <ng-container matColumnDef="assignment-professeur">
        <th mat-header-cell *matHeaderCellDef> Prof </th>
        <td mat-cell *matCellDef="let element">
          {{element.professeur}}
        </td>
      </ng-container>

      <!-- Note -->
      <ng-container matColumnDef="assignment-note">
        <th mat-header-cell *matHeaderCellDef> Note </th>
        <td mat-cell *matCellDef="let element">
          {{element.note}} /20
        </td>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="assignment-dateDeRendu">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let element">
          {{element.dateDeRendu}}
        </td>
      </ng-container>

      <!-- Rendu -->
      <ng-container matColumnDef="assignment-rendu">
        <th mat-header-cell *matHeaderCellDef> Rendu </th>
        <td mat-cell *matCellDef="let element">
          <span [ngClass]="element.rendu ? 'badge success' : 'badge danger'">
            {{element.rendu ? '✔' : '✖'}}
          </span>
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="assignment-actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">

          <button *ngIf="auth.isAdmin()"
                  mat-mini-button color="primary"
                  (click)="onEdit(element)">
            ✏️
          </button>

          <button *ngIf="auth.isAdmin()"
                  mat-mini-button color="warn"
                  (click)="onDelete(element)">
            🗑️
          </button>

        </td>
      </ng-container>

      <!-- VOIR -->
      <ng-container matColumnDef="voir">
        <th mat-header-cell *matHeaderCellDef> </th>
        <td mat-cell *matCellDef="let element">
          <button class="voir-btn"
                  (click)="voirDetail(element)">
            Voir
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </div>

  <!-- PAGINATION -->
  <mat-paginator
    [length]="totalDocs"
    [pageSize]="limit"
    [pageIndex]="page - 1"
    (page)="pageChange($event)">
  </mat-paginator>

</div>
