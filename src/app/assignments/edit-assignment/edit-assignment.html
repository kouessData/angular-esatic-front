<div class="form-container">

  <h2>Modifier Assignment</h2>
  <p class="subtitle">Mettez a jour les informations sans perdre l'historique.</p>

  <!-- Nom étudiant -->
  <div class="form-group">
    <label>👨‍🎓 Étudiant</label>
    <input [(ngModel)]="assignment.nom" />
  </div>

  <!-- Nom devoir -->
  <div class="form-group">
    <label>📘 Nom du devoir</label>
    <input [(ngModel)]="assignment.nomDevoir" />
  </div>

  <!-- Matière -->
  <div class="form-group">
    <label>📚 Matière</label>
    <select [(ngModel)]="assignment.matiere" (change)="onMatiereChange()">
      <option *ngFor="let m of matieres" [value]="m.nom">
        {{m.nom}}
      </option>
    </select>
  </div>

  <!-- Prof (auto) -->
  <div class="form-group">
    <label>👨‍🏫 Professeur</label>
    <input [value]="assignment.professeur" disabled />
  </div>

  <!-- Note -->
  <div class="form-group">
    <label>📊 Note</label>
    <input type="number" [(ngModel)]="assignment.note" />
  </div>

  <!-- Date -->
  <div class="form-group">
    <label>📅 Date de rendu</label>
    <input type="date" [(ngModel)]="assignment.dateDeRendu" />
  </div>

  <!-- Rendu -->
  <div class="form-group checkbox">
    <label>
      <input type="checkbox" [(ngModel)]="assignment.rendu" />
      ✔ Rendu
    </label>
  </div>

  <!-- Remarques -->
  <div class="form-group">
    <label>📝 Remarques</label>
    <textarea [(ngModel)]="assignment.remarques"></textarea>
  </div>

  <!-- Bouton -->
  <button (click)="onSave()">Sauvegarder</button>

</div>
