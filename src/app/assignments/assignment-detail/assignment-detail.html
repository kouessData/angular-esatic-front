<!-- on affiche la valeur du signal assignmentTransmis -->
<!-- ASTUCE : avec le as on peut garder une écriture compacte
  pour accèder aux propriétés de l'objet reçu en tant que signal -->
@if(assignmentAffiche(); as assignment) {
    <mat-card appearance="outlined">
        <mat-card-header>
           <mat-card-title>Détails de l'assignment</mat-card-title>
           <mat-card-subtitle>On pourra ajouter image etc.</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            
            <h2>{{assignment.nomDevoir}}</h2>

            <h3>{{assignment.nom}}</h3>

            <!-- <img [src]="this.auteur.set("https://randomuser.me/api/portraits/men/1.jpg");" width="100" > -->


            <p><strong>Matière :</strong> {{assignment.matiere}}</p>
            <p><strong>Prof :</strong> {{assignment.professeur}}</p>

           <!--   <img [src]="this.imageMatiere.set("https://picsum.photos/200");" width="200"> -->

            <p><strong>Note :</strong> {{assignment.note}} /20</p>

            <p><strong>Remarques :</strong></p>
            <p>{{assignment.remarques}}</p>
        </mat-card-content>

        <mat-card-actions id="bottom">
            <mat-checkbox 
                [checked]="assignment.rendu"
                (click)="onAssignmentRendu()"
            >
                Rendu
            </mat-checkbox>

            <a routerLink="edit">
                <button 
                    mat-stroked-button 
                    color="primary"
                    [disabled]="!isAdmin()"
                >
                    EDIT
                </button>
            </a>

            <button 
                mat-stroked-button 
                color="warn"
                (click)="onDeleteAssignment()"
            >
                DELETE
            </button>
        </mat-card-actions>
    </mat-card>
}
