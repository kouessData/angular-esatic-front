<div class="container">

  <h2 class="title">
    <mat-icon>add_circle</mat-icon>
    Ajouter un Assignment
  </h2>

  <form (ngSubmit)="onSubmit()" class="form-grid">
    

    <!-- 🟦 ETUDIANT -->
    <mat-card class="card">
      <h3><mat-icon>person</mat-icon> Informations Étudiant</h3>

      <mat-form-field appearance="outline">
        <mat-label>Nom étudiant</mat-label>
        <input matInput [(ngModel)]="assignment.nom" name="nom">
      </mat-form-field>

      <div class="file-upload">
        <label><mat-icon>photo_camera</mat-icon> Photo étudiant</label>

        <input type="file" (change)="uploadPhotoEtudiant($event)">

        <img *ngIf="assignment.auteur"
             [src]="assignment.auteur"
             class="preview-img">
      </div>
    </mat-card>


    <!-- 🟩 DEVOIR -->
    <mat-card class="card">
      <h3><mat-icon>menu_book</mat-icon> Informations Devoir</h3>

      <div class="grid-2">

        <mat-form-field appearance="outline">
          <mat-label>Nom du devoir</mat-label>
          <input matInput [(ngModel)]="assignment.nomDevoir" name="nomDevoir">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Matière</mat-label>
          <mat-select [(ngModel)]="assignment.matiere"
                      name="matiere"
                      (selectionChange)="onMatiereChange()">

            <mat-option *ngFor="let m of matieres" [value]="m.nom">
              {{m.nom}}
            </mat-option>

          </mat-select>
        </mat-form-field>

        <!-- Image matière -->
        <div class="file-upload full">
          <label><mat-icon>image</mat-icon> Image matière</label>
          <input type="file" (change)="uploadImageMatiere($event)">

          <img *ngIf="assignment.imageMatiere"
               [src]="assignment.imageMatiere"
               class="preview-img">
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Professeur</mat-label>
          <input matInput [value]="assignment.professeur" disabled>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Note</mat-label>
          <input matInput type="number" [(ngModel)]="assignment.note" name="note">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date de rendu</mat-label>
          <input matInput type="date"
                 [(ngModel)]="assignment.dateDeRendu"
                 name="dateDeRendu">
        </mat-form-field>

        <mat-checkbox [(ngModel)]="assignment.rendu" name="rendu" class="full">
          ✔ Devoir rendu
        </mat-checkbox>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Remarques</mat-label>
          <textarea matInput [(ngModel)]="assignment.remarques" name="remarques"></textarea>
        </mat-form-field>

      </div>
    </mat-card>

    <!-- 🚀 BUTTON -->
    <div class="actions">
      <button mat-raised-button color="accent">
        <mat-icon>save</mat-icon>
        Enregistrer
      </button>
    </div>

  </form>

</div>
