<h3>Ajout d'un Assignment (composant fils)</h3>

<form ngForm 
      #assignmentForm
      (submit)="onSubmit(); assignmentForm.reset()"
      class="form"
>
    <!-- STEP 1 ETUDIANT-->
    <mat-horizontal-stepper> 
    
        <mat-step label="Étudiant">
            <mat-form-field>
                <mat-label>Nom étudiant</mat-label>
                <input matInput
                (input)="nom.set($event.target.value)">
        </mat-form-field>
            
            <mat-form-field>
                <mat-label>Photo étudiant (URL)</mat-label>
                <input matInput
                [ngModel]="auteur()"
                (ngModelChange)="auteur.set($event)">
            </mat-form-field>
            <button mat-button matStepperNext>Suivant</button>
        </mat-step>

    <!-- STEP 2 INFO PROF -->
        <mat-step label="Matière">

            <mat-form-field>
                <mat-label>Matière</mat-label>
                <mat-select
                (selectionChange)="onMatiereChange($event.value)">
                <mat-option value="Angular">Angular</mat-option>
                <mat-option value="AWS Cloud">AWS Cloud</mat-option>
                <mat-option value="BD">Base de données</mat-option>
                <mat-option value="Economie">Economie</mat-option>
                <mat-option value="Hadoop">Hadoop</mat-option>
                <mat-option value="IA">IA</mat-option>
                <mat-option value="Machine Learning">Machine Learning</mat-option>
                <mat-option value="SpringBoot">SpringBoot</mat-option>
                <mat-option value="Web">Web</mat-option>
                

                </mat-select>
            </mat-form-field>

            <p>Professeur : {{professeur()}}</p>

            <img [src]="imageMatiere()" width="150">

            <button mat-button matStepperPrevious>Retour</button>
            <button mat-button matStepperNext>Suivant</button>
        </mat-step>

        <!-- STEP 3 DATE DE RENDU -->
        <mat-step label="Évaluation">

            <mat-form-field>
                <mat-label>Intitulé du Devoir</mat-label>
                <input matInput
                [ngModel]="nomDevoir()"
                (ngModelChange)="nomDevoir.set($event)">
            </mat-form-field>        

            <mat-form-field>
                <mat-label>Note /20</mat-label>
                <input matInput type="number"
                [ngModel]="note()"
                (ngModelChange)="note.set($event)">
            </mat-form-field>

            <mat-form-field>
                <mat-label>Remarques</mat-label>
                <textarea matInput
                [ngModel]="remarques()"
                (ngModelChange)="remarques.set($event)">
                </textarea>
            </mat-form-field>

            <button mat-raised-button color="primary"
                    (click)="onSubmit()">
                Valider
            </button>
        </mat-step>



   

        <button mat-stroked-button 
                color="primary"
                
                [disabled]="!dateDeRendu() || !nomDevoir() || !nom() || !matiere() || note() === undefined"
        >
            Ajouter un Assignment
        </button>
    </mat-horizontal-stepper>
</form>
